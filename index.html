<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    header {
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;

      color: #94a3b8;

      text-align: center;
    }

    .projects {
      display: flex;
      justify-content: center;

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #334155;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }

  <div class="projects">

    <div class="card">
      <h3>Project 2</h3>

<section class="section">
